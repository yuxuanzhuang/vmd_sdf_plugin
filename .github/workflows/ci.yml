name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Linux
            id: linux
            os: ubuntu-latest
          - name: macOS
            id: macos
            os: macos-latest
          - name: Windows
            id: windows
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        if: matrix.target.id == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc
            zip

      - name: Build plugin (Linux/macOS)
        if: matrix.target.id != 'windows'
        run: make clean all

      - name: Build plugin (Windows)
        if: matrix.target.id == 'windows'
        shell: msys2 {0}
        run: make clean all

      - name: Package runtime bundle (Linux/macOS)
        if: matrix.target.id != 'windows'
        id: package_unix
        run: |
          set -euo pipefail
          version="ci-${GITHUB_SHA::7}"
          make package PACKAGE_VERSION="${version}"
          archive="$(make --silent print-package-file PACKAGE_VERSION="${version}")"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Package runtime bundle (Windows)
        if: matrix.target.id == 'windows'
        id: package_windows
        shell: msys2 {0}
        run: |
          set -euo pipefail
          version="ci-${GITHUB_SHA::7}"
          make package PACKAGE_VERSION="${version}"
          archive="$(make --silent print-package-file PACKAGE_VERSION="${version}")"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: sdf-plugin-${{ matrix.target.id }}
          path: ${{ steps.package_unix.outputs.archive || steps.package_windows.outputs.archive }}
          if-no-files-found: error
